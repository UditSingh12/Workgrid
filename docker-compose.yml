services:
  mongo:
    image: mongo:7
    container_name: workgrid-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: workgrid
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workgrid-app
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: http://localhost:4000
      JWT_SECRET: change-this-jwt-secret
      JWT_EXPIRES_IN: 7d
      MONGODB_URI: mongodb://mongo:27017/workgrid
      SERVE_STATIC_FRONTEND: "true"
    ports:
      - "4000:4000"

volumes:
  mongo_data:
